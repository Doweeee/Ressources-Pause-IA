  <!-- ============================================================
       SCRIPT BLOQUANT : calcule la transform initiale du stage
       AVANT que le HTML soit rendu. Injecte une balise <style>
       qui place le stage exactement au bon endroit dès la première
       frame. Aucun "flash" possible.
       ============================================================ -->
  <script>
    (function () {
      var MAP_W = 2048, MAP_H = 1152;
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var margin = 0.92;
      var scale = Math.min((vw / MAP_W) * margin, (vh / MAP_H) * margin);
      var x = (vw - MAP_W * scale) / 2;
      var y = (vh - MAP_H * scale) / 2;
      // On expose ces valeurs pour map.js (qui les utilisera pour Panzoom)
      window.__mapInitialFit = { scale: scale, x: x, y: y };
      // Et on injecte la transform en CSS pour qu'elle s'applique au rendu initial
      var s = document.createElement('style');
      s.textContent =
        '.map-stage{transform:translate(' + x + 'px,' + y + 'px) scale(' + scale + ');' +
        'transform-origin:0 0;visibility:visible !important}';
      document.head.appendChild(s);
    })();
  </script>
